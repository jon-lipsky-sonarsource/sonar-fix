# =============================================================================
# Caller Workflow: SonarQube Auto-Fix — Triggered by PR Events
# =============================================================================
# This is the "classic" trigger: runs the scan and auto-fix on every PR push.
# Use this if you want auto-fix to run regardless of quality gate status, or
# if you don't have SonarCloud PR summary comments enabled.
#
# For the recommended comment-triggered approach, see:
#   examples/caller-comment-triggered.yml
#
# Required secrets: SONAR_TOKEN, ANTHROPIC_API_KEY
# Required variables: SONAR_PROJECT_KEY, SONAR_ORG
# =============================================================================

name: "SonarQube Auto-Fix"

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: sonar-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sonar-autofix:
    uses: my-org/sonar-autofix/.github/workflows/path2-claude-autofix.yml@v1
    with:
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
      sonar-org: ${{ vars.SONAR_ORG }}
      pr-number: ${{ github.event.pull_request.number }}
      pr-branch: ${{ github.head_ref }}
      enable-agentic-analysis: true
      run-sonar-scan: true     # Run the scan ourselves (not waiting for SonarCloud)
    secrets: inherit
