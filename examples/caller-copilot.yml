# =============================================================================
# Caller Workflow: SonarQube Fix with Copilot — PR-Triggered
# =============================================================================
# Required secrets: SONAR_TOKEN, COPILOT_PAT
# Required variables: SONAR_PROJECT_KEY
#
# The comment-triggered variant (caller-comment-triggered.yml) also works
# with the Copilot workflow — just change the reusable workflow reference.
# =============================================================================

name: "SonarQube Fix (Copilot)"

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: sonar-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Required: the reusable workflow posts an @copilot comment on the PR and
# the Copilot agent itself pushes commits. Without this block the read-only
# default token rejects the reusable workflow's permissions request at
# validation time.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sonar-fix:
    uses: my-org/sonar-fix/.github/workflows/copilot-fix.yml@v1
    with:
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
      pr-number: ${{ github.event.pull_request.number }}
      pr-branch: ${{ github.head_ref }}
    secrets: inherit
