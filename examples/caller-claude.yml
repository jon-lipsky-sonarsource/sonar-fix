# =============================================================================
# Caller Workflow: SonarQube Fix — Triggered by PR Events
# =============================================================================
# This is the "classic" trigger: runs the scan and fix on every PR push.
# Use this if you want fix to run regardless of quality gate status, or
# if you don't have SonarCloud PR summary comments enabled.
#
# For the recommended comment-triggered approach, see:
#   examples/caller-comment-triggered.yml
#
# Required secrets: SONAR_TOKEN, ANTHROPIC_API_KEY
# Required variables: SONAR_PROJECT_KEY, SONAR_ORG
# =============================================================================

name: "SonarQube Fix"

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: sonar-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Required: the reusable workflow pushes the agent's fix commit and posts
# review comments. Without this block the read-only default token rejects
# the reusable workflow's permissions request at validation time.
permissions:
  contents: write
  pull-requests: write
  issues: write
  # Required by claude-code-action — it fetches an OIDC token to authenticate
  # to Anthropic's auth backend. Without this, the step fails with "Could
  # not fetch an OIDC token".
  id-token: write

jobs:
  sonar-fix:
    uses: my-org/sonar-fix/.github/workflows/claude-fix.yml@v1
    with:
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
      sonar-org: ${{ vars.SONAR_ORG }}
      pr-number: ${{ github.event.pull_request.number }}
      pr-branch: ${{ github.head_ref }}
      enable-agentic-analysis: true
      run-sonar-scan: true     # Run the scan ourselves (not waiting for SonarCloud)
      # Optional: route Claude through an API gateway (Portkey, Helicone, etc.)
      # by setting a `vars.ANTHROPIC_BASE_URL` repo variable. Empty = direct.
      anthropic-base-url: ${{ vars.ANTHROPIC_BASE_URL }}
    secrets: inherit
