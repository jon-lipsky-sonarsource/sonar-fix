# =============================================================================
# Reusable Workflow: SonarQube + Copilot Coding Agent Fix
# =============================================================================
# Central org-wide workflow. Individual repos call this with minimal config.
#
# Prerequisites for the calling repo:
#   - Copilot coding agent enabled (Settings > Copilot > Coding agent)
#   - SonarQube MCP server configured in Copilot's MCP settings
#     (see copilot-mcp-setup.json in this repo)
#   - COPILOT_MCP_SONAR_TOKEN and COPILOT_MCP_SONAR_ORG as Copilot env secrets
#
# Called from a repo like:
#   jobs:
#     sonar-fix:
#       uses: my-org/sonar-fix/.github/workflows/copilot-fix.yml@v1
#       with:
#         sonar-project-key: my-org_my-repo
#       secrets: inherit
# =============================================================================

name: "Reusable: SonarQube + Copilot Fix"

on:
  workflow_call:
    inputs:
      sonar-project-key:
        description: "SonarQube project key"
        required: true
        type: string
      pr-number:
        description: "Pull request number"
        required: true
        type: number
      pr-branch:
        description: "Pull request head branch name"
        required: true
        type: string
      config-path:
        description: "Path to sonar-fix-config.yml (relative to calling repo)"
        required: false
        type: string
        default: ".github/sonar-fix-config.yml"
      sonar-host-url:
        description: "SonarQube host URL"
        required: false
        type: string
        default: "https://sonarcloud.io"
      run-sonar-scan:
        description: "Whether to run sonar scan"
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        description: "SonarQube user token"
        required: true
      COPILOT_PAT:
        description: "GitHub PAT (classic, repo scope) from a Copilot subscriber"
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # =========================================================================
  # Job 1: Scan and Triage
  # =========================================================================
  scan-and-triage:
    name: "Scan & Triage"
    runs-on: ubuntu-latest
    outputs:
      has_issues: ${{ steps.triage.outputs.has_issues }}
      has_auto_fix: ${{ steps.triage.outputs.has_auto_fix }}
      agent: ${{ steps.triage.outputs.agent }}
      issues_json: ${{ steps.triage.outputs.issues_json }}
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        if: inputs.run-sonar-scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}

      - name: Wait for analysis
        if: inputs.run-sonar-scan
        run: sleep 15

      - name: Checkout sonar-fix repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sonar-fix
          path: .sonar-fix-action

      # Use the consumer's config if they shipped one; otherwise fall back to
      # the central default. Consumers only ship a config to override defaults.
      - name: Resolve config path
        id: resolve-config
        run: |
          if [ -f "${{ inputs.config-path }}" ]; then
            echo "Using consumer config: ${{ inputs.config-path }}"
            echo "path=${{ inputs.config-path }}" >> "$GITHUB_OUTPUT"
          else
            echo "No consumer config at ${{ inputs.config-path }} — using central default"
            echo "path=.sonar-fix-action/config/default.yml" >> "$GITHUB_OUTPUT"
          fi

      - name: Triage issues
        id: triage
        uses: ./.sonar-fix-action/triage-action
        with:
          config-path: ${{ steps.resolve-config.outputs.path }}
          project-key: ${{ inputs.sonar-project-key }}
          branch: ${{ inputs.pr-branch }}
          pr-number: ${{ inputs.pr-number }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}

  # =========================================================================
  # Job 2: Post triage comment listing both auto-fix queue and review-only
  # =========================================================================
  post-triage-comment:
    name: "Post Triage Comment"
    needs: scan-and-triage
    if: needs.scan-and-triage.outputs.has_issues == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const issuesData = ${{ needs.scan-and-triage.outputs.issues_json }};
            const autoFix = issuesData.auto_fix || [];
            const reviewOnly = issuesData.review_only || [];
            const summary = issuesData.summary || {};

            if (autoFix.length === 0 && reviewOnly.length === 0) return;

            const severityEmoji = {
              BLOCKER: '🔴', CRITICAL: '🟠', MAJOR: '🟡',
              MINOR: '🔵', INFO: '⚪'
            };

            // Deep-link each issue to its detail page in SonarCloud /
            // SonarQube Cloud. Falls back to a plain code span when the
            // issue's `key` field is missing.
            const sonarHost = '${{ inputs.sonar-host-url }}'.replace(/\/+$/, '');
            const projectKey = '${{ inputs.sonar-project-key }}';
            const prNumber = ${{ inputs.pr-number }};
            const sonarLink = (issueKey) =>
              `${sonarHost}/project/issues?id=${encodeURIComponent(projectKey)}` +
              `&pullRequest=${prNumber}&open=${encodeURIComponent(issueKey)}` +
              `&issues=${encodeURIComponent(issueKey)}`;
            const ruleSpan = (i) =>
              i.key ? `[\`${i.rule}\`](${sonarLink(i.key)})` : `\`${i.rule}\``;

            const formatList = (issues) => {
              let out = '';
              for (const i of issues) {
                const emoji = severityEmoji[i.severity] || '❓';
                out += `- ${emoji} **${ruleSpan(i)}** in \`${i.component}\``;
                if (i.line) out += `:${i.line}`;
                out += ` — ${i.message}\n`;
              }
              return out;
            };

            const total = summary.total_issues || (autoFix.length + reviewOnly.length);
            let body = `## 🤖 sonar-fix — triage report\n\n`;
            body += `Found **${total}** SonarQube issue(s) on this PR.\n\n`;

            if (autoFix.length > 0) {
              body += `### 🔧 Dispatched to @copilot (${autoFix.length})\n\n`;
              body += formatList(autoFix);
              body += '\n';
            }

            if (reviewOnly.length > 0) {
              body += `### 🔍 Needs human review (${reviewOnly.length})\n\n`;
              body += formatList(reviewOnly);
              body += '\n';
            }

            body += `---\n`;
            body += `<sub>Posted by [sonar-fix](https://github.com/${{ github.repository_owner }}/sonar-fix). `;
            body += `${total} total · ${autoFix.length} to fix · ${reviewOnly.length} for review.</sub>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr-number }},
              body
            });

  # =========================================================================
  # Job 3: Dispatch to Copilot via @copilot PR comment
  # =========================================================================
  copilot-fix:
    name: "Copilot Fix"
    needs: scan-and-triage
    if: |
      needs.scan-and-triage.outputs.has_auto_fix == 'true' &&
      (needs.scan-and-triage.outputs.agent == 'copilot' ||
       needs.scan-and-triage.outputs.agent == 'both')
    runs-on: ubuntu-latest
    steps:
      # Pull the central sonar-fix repo so we can inline its agent prompt
      # into the @copilot comment. Single source of truth for the protocol
      # — improvements here apply to every consumer on the next run.
      - name: Checkout sonar-fix repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sonar-fix
          path: .sonar-fix-action

      - name: Trigger Copilot via @copilot comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const fs = require('fs');
            const issuesData = ${{ needs.scan-and-triage.outputs.issues_json }};
            const autoFix = issuesData.auto_fix || [];

            if (autoFix.length === 0) return;

            const agentPrompt = fs.readFileSync(
              '.sonar-fix-action/prompts/sonar-fix-agent.md', 'utf8'
            );

            const issueList = autoFix.map(i => {
              let entry = `- **\`${i.rule}\`** [${i.severity}] in \`${i.component}\``;
              if (i.line) entry += `:${i.line}`;
              entry += `\n  ${i.message}`;
              return entry;
            }).join('\n');

            const body = [
              '@copilot Please fix the following SonarQube code quality issues',
              'in this pull request.',
              '',
              '---',
              '',
              agentPrompt,
              '',
              '---',
              '',
              `## Issues to fix (${autoFix.length})`,
              '',
              issueList,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr-number }},
              body
            });

            console.log(`Posted @copilot comment with ${autoFix.length} issues.`);
